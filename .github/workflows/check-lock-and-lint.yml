name: check-lock-and-lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-lock-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.26"

      - name: Set up Python from pyproject.toml
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Check lock, lint, and formatting
        run: make quality
